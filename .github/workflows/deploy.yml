name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # Publishes the static export (out/) to the `gh-pages` branch.
      # Source lives on `main`; `gh-pages` is the generated build artifact.
      # In repo Settings → Pages, set Source = "Deploy from a branch" → gh-pages / (root).
      - name: Deploy to Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          user_name: PandyaKavya
          user_email: kavyaadi98@gmail.com
          commit_message: "Deploy ${{ github.sha }}"
